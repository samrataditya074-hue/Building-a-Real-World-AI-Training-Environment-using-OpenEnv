version: "1.0"
metadata:
  name: "autonomous-ceo-env"
  description: "An AI acts as a CEO making quarterly strategic decisions."

action_space:
  type: continuous
  shape: [8]
  range: [-1.0, 1.0]
  description: >
    8 levers: Price Adjustment, Marketing Spend, Hiring/Firing, R&D Investment,
    Salary Adjustments, Task Allocation, Crisis Response, and Budget Shift.

observation_space:
  type: continuous
  shape: [14]
  range: [0.0, 2.0]
  description: >
    14 metrics including normalized cash, revenue, morale, inventory,
    market trend, brand reputation, and crisis threshold flags.

reward:
  type: continuous
  range: [-200.0, 300.0]
  description: "Continuous shaping: combining profit delta, morale shifts, R&D payoff, and layoff penalties."

tasks:
  - name: easy
    description: "Survive for 4 quarters without bankruptcy or collapse."
  - name: medium
    description: "Operate for 50 quarters. Maximize valuation growth while maintaining morale."
  - name: hard
    description: "Operate for 50 quarters. Consistently undercut competitor pricing while maintaining profitability."
