spec_version: 1
name: support_ticket_env
description: >
  Hybrid Customer Support and Business Intelligence environment.
  The agent handles support tickets but must optimize for both
  customer satisfaction and business operations (costs).
author: samrataditya074-hue
version: 1.0.0
runtime: docker
entry_point: customer_support_env/app.py
port: 7860

action_space:
  type: Dict
  fields:
    - name: action_type
      type: string
      enum: [categorize, reply, escalate]
      description: "Action type to perform."
    - name: content
      type: string
      description: "Text content associated with the action."

observation_space:
  type: Dict
  array_shape: [11]
  array_dtype: float32
  fields:
    - name: ticket_id
      type: string
    - name: customer_message
      type: string
    - name: category
      type: string
      nullable: true
    - name: conversation_history
      type: list[string]
    - name: urgency
      type: string
      enum: [low, medium, high]
    - name: resolved
      type: boolean
    - name: step_count
      type: integer
    - name: last_action_type
      type: string
      nullable: true
    - name: satisfaction_score
      type: float
    - name: cost_spent
      type: float
    - name: tickets_resolved
      type: integer

reward:
  type: continuous
  range: [0.0, 1.0]
  description: Dense reward balancing support quality and business impact.
  components:
    positive:
      - name: correct_categorize
        value: +0.30
      - name: helpful_response
        value: +0.40
      - name: correct_escalate
        value: +0.30
      - name: high_satisfaction
        value: +0.20
      - name: fast_resolution
        value: +0.20
    negative:
      - name: unnecessary_escalation
        value: -0.30
      - name: repeated_action
        value: -0.30

tasks:
  - id: easy
    difficulty: easy
    name: "Correct Ticket Categorization"
    description: "Successfully categorize the ticket based on customer message."
    grader: customer_support_env.graders.grade_easy
    max_steps: 5
    score_range: [0.0, 1.0]

  - id: medium
    difficulty: medium
    name: "Helpful and Polite Reply"
    description: "Provide a response containing helpful and polite terms."
    grader: customer_support_env.graders.grade_medium
    max_steps: 5
    score_range: [0.0, 1.0]

  - id: hard
    difficulty: hard
    name: "Business Impact Optimization"
    description: "Resolve issue, maintain high satisfaction and minimize unnecessary cost."
    grader: customer_support_env.graders.grade_hard
    max_steps: 5
    score_range: [0.0, 1.0]
