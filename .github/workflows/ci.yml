name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        run: pytest tests/ -v --tb=short

      - name: Run non-technical demo (smoke test)
        run: python demo_nontech.py --quarters 5 --seed 42

      - name: Run baseline inference (heuristic policy, no API key)
        run: python baseline_inference.py --seed 42 --output baseline_results.json

      - name: Print baseline results
        run: cat baseline_results.json
