spec_version: 1
name: autonomous_ceo_env
description: >
  An OpenEnv-compliant Reinforcement Learning environment simulating a business ecosystem.
  The agent acts as CEO, making strategic decisions to maximize company valuation while 
  maintaining employee morale and operational health.
author: samrataditya074-hue
version: 2.0.0
runtime: docker
entry_point: app.py
port: 7860

# ─── Action Space ────────────────────────────────────────────────────────────
action_space:
  type: Box
  shape: [8]
  dtype: float32
  low: -1.0
  high: 1.0
  fields:
    - name: price_adjustment
      index: 0
      description: "Relative price change [-1, 1]."
    - name: marketing_push
      index: 1
      description: "Marketing spend [0, 1]."
    - name: hire_fire
      index: 2
      description: "Workforce change [-1, 1]."
    - name: rd_investment
      index: 3
      description: "R&D spend [0, 1]."
    - name: salary_adjustment
      index: 4
      description: "Salary change [-1, 1]."
    - name: task_allocation
      index: 5
      description: "Specialization vs Flexibility [-1, 1]."
    - name: crisis_response
      index: 6
      description: "Crisis handling strategy [-1, 1]."
    - name: budget_shift
      index: 7
      description: "Sales vs Ops investment [-1, 1]."

# ─── Observation Space ───────────────────────────────────────────────────────
observation_space:
  type: Box
  shape: [14]
  dtype: float32
  low: 0.0
  high: 2.0

# ─── Reward ──────────────────────────────────────────────────────────────────
reward:
  type: continuous
  range: [-200.0, 300.0]
  description: "Densely calculated business performance reward."

# ─── Tasks ───────────────────────────────────────────────────────────────────
# MANDATORY TASK IDs for Scaler Evaluation
tasks:
  - id: review_annual_report
    difficulty: easy
    name: "Review Annual Report (Survival)"
    description: "Successfully run the company for 4 quarters without bankruptcy."
    grader: "graders:grade_easy"
    max_steps: 4
    score_range: [0.01, 0.99]

  - id: allocate_budget
    difficulty: medium
    name: "Allocate Quarterly Budget (Valuation)"
    description: "Grow company valuation by 20% over 50 quarters while maintaining morale > 60%."
    grader: "graders:grade_medium"
    max_steps: 50
    score_range: [0.01, 0.99]

  - id: negotiate_merger
    difficulty: hard
    name: "Negotiate Strategic Merger (Pricing War)"
    description: "Maintain market dominance by undercutting competitors for 8 quarters profitably."
    grader: "graders:grade_hard"
    max_steps: 50
    score_range: [0.01, 0.99]
