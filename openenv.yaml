spec_version: 1
name: Autonomous-CEO-Simulator
description: >
  A high-fidelity business executive simulation where an AI agent acts as CEO,
  navigating complex markets, managing teams, and making strategic trade-offs
  to maximize company valuation and operational success.
author: samrataditya074-hue
version: 2.1.0
runtime: docker
entry_point: server/app.py
port: 7860


# ─── Action Space ────────────────────────────────────────────────────────────
# 8 continuous levers, each in [-1.0, +1.0]
action_space:
  type: Box
  shape: [8]
  dtype: float32
  low: -1.0
  high: 1.0
  fields:
    - name: price_adjustment
      index: 0
      range: [-1.0, 1.0]
      description: >
        Adjusts product price relative to the competitor.
        +1 = raise price by $8 (higher margin, fewer customers).
        -1 = lower price by $8 (more customers, thinner margin).

    - name: marketing_push
      index: 1
      range: [0.0, 1.0]
      description: >
        Quarterly marketing spend.
        0 = $0 spent.  +1 = $600 spent → boosts demand and customer satisfaction.

    - name: hire_fire
      index: 2
      range: [-1.0, 1.0]
      description: >
        Workforce change.
        +1 = hire 5 people.  -1 = fire 5 lowest performers.
        Firing damages remaining employee morale (-3% per person fired).

    - name: rd_investment
      index: 3
      range: [0.0, 1.0]
      description: >
        R&D budget this quarter.
        0 = $0.  +1 = $400 → increments R&D progress (0–100 scale).
        R&D > 30 unlocks efficiency gains; R&D > 70 boosts brand reputation.

    - name: salary_adjustment
      index: 4
      range: [-1.0, 1.0]
      description: >
        Salary change applied to employees.
        +1 = +10% (merit-based bonus to top performers only).
        -1 = -10% company-wide cut (saves cost but hurts morale).

    - name: task_allocation
      index: 5
      range: [-1.0, 1.0]
      description: >
        Team structure decision.
        +1 = cross-train all teams (flexible but slightly less efficient).
        -1 = specialise teams (more efficient, individual performance +1.5).

    - name: crisis_response
      index: 6
      range: [-1.0, 1.0]
      description: >
        Crisis handling strategy (only has effect when ≥1 crisis is active).
        +1 = invest through crisis (-$500 cash, +5% morale, +3 reputation).
        -1 = emergency cost-cut (+$300 cash, -5% morale).

    - name: budget_shift
      index: 7
      range: [-1.0, 1.0]
      description: >
        Reallocates budget between Sales and Operations.
        +1 = aggressive growth (more sales spend, less ops spend).
        -1 = conservative savings (less sales spend, more ops spend).

# ─── Observation Space ───────────────────────────────────────────────────────
# 14 normalised floats returned to the agent every step
observation_space:
  type: Box
  shape: [14]
  dtype: float32
  low: 0.0
  high: 2.0
  fields:
    - name: cash_norm
      index: 0
      range: [0.0, ~2.0]
      norm_constant: 200000
      description: "Current cash reserves divided by $200,000."

    - name: revenue_norm
      index: 1
      range: [0.0, ~2.0]
      norm_constant: 5000
      description: "Quarterly revenue divided by $5,000."

    - name: customer_satisfaction_norm
      index: 2
      range: [0.0, 1.0]
      norm_constant: 100
      description: "Customer satisfaction (0–100) divided by 100."

    - name: employee_morale_norm
      index: 3
      range: [0.0, 1.0]
      norm_constant: 100
      description: "Average employee morale (0–100) divided by 100."

    - name: inventory_norm
      index: 4
      range: [0.0, ~2.0]
      norm_constant: 1000
      description: "Units in stock divided by 1,000."

    - name: market_trend
      index: 5
      range: [0.4, 1.6]
      norm_constant: 1
      description: "Economic health multiplier. 1.0 = neutral, >1 = boom, <1 = recession."

    - name: total_employees_norm
      index: 6
      range: [0.0, 1.0]
      norm_constant: 50
      description: "Number of employees divided by 50 (max expected)."

    - name: brand_reputation_norm
      index: 7
      range: [0.0, 1.0]
      norm_constant: 100
      description: "Brand reputation score (0–100) divided by 100."

    - name: operational_efficiency_norm
      index: 8
      range: [0.0, 1.0]
      norm_constant: 100
      description: "How efficiently the company operates (0–100) divided by 100."

    - name: rd_progress_norm
      index: 9
      range: [0.0, 1.0]
      norm_constant: 100
      description: "R&D advancement level (0–100) divided by 100."

    - name: debt_norm
      index: 10
      range: [0.0, ~2.0]
      norm_constant: 10000
      description: "Total company debt divided by $10,000."

    - name: cash_crisis_flag
      index: 11
      range: [0.0, 1.0]
      description: "1.0 if cash < $2,000 (critical); 0.0 otherwise."

    - name: morale_crisis_flag
      index: 12
      range: [0.0, 1.0]
      description: "1.0 if average morale < 35% (employee exodus risk); 0.0 otherwise."

    - name: competitor_price_norm
      index: 13
      range: [0.0, 1.5]
      norm_constant: 100
      description: "Competitor's current product price divided by $100."

# ─── Reward ──────────────────────────────────────────────────────────────────
reward:
  type: continuous
  range: [-200.0, 300.0]
  description: >
    Per-step reward combining profitability, team health, brand strength,
    R&D payoff, and penalties for destructive actions.
  normalization_constants:
    PROFIT_NORM: 80
    MORALE_NORM: 10
    SATISFACTION_NORM: 40
    REPUTATION_NORM: 80
    RD_SCALE: 0.2
    FIRE_PENALTY: -0.3
    TERMINAL_PENALTY: -50.0

# ─── Tasks ───────────────────────────────────────────────────────────────────
tasks:
  - id: easy_revenue_target
    difficulty: easy
    name: "[Easy] Revenue Growth Benchmark"
    description: >
      Demonstrate fundamental business operations by increasing quarterly revenue 
      by 10% relative to initial startup levels within a 4-quarter window.
    evaluation_criteria: >
      Success is measured by the peak revenue achieved. Score is a continuous float 
      in (0.01, 0.99) calculated from achievement levels (70%) and survival (30%).
    grader: "graders:grade_revenue_target"
    max_steps: 4
    score_range: [0.01, 0.99]

  - id: medium_budget_balance
    difficulty: medium
    name: "[Medium] Budget Scaling & Workforce Management"
    description: >
      Scale the organization to >25 employees while maintaining a balanced budget 
      distribution (>10% per department) and preventing bankruptcy over 8 quarters.
    evaluation_criteria: >
      Score in (0.01, 0.99) based on the stability of department funding (60%) 
      and the successful expansion of the workforce toward 30 staff (40%).
    grader: "graders:grade_budget_balance"
    max_steps: 8
    score_range: [0.01, 0.99]

  - id: hard_strategic_growth
    difficulty: hard
    name: "[Hard] Long-Term Valuation optimization"
    description: >
      Maximize the company's intrinsic valuation over a 12-quarter strategic cycle 
      by prioritizing R&D progress, brand reputation, and operational excellence.
    evaluation_criteria: >
      Continuous score in (0.01, 0.99). Weighted average of terminal valuation (50%), 
      total R&D advancement (25%), and customer brand sentiment (25%).
    grader: "graders:grade_strategic_growth"
    max_steps: 12
    score_range: [0.01, 0.99]

  - id: ultimate_ceo_mastery
    difficulty: Super Hard
    name: "[Super Hard] Ultimate CEO Mastery"
    description: >
      The agent must simultaneously achieve revenue growth, maintain workforce and financial stability, 
      and maximize company valuation without triggering any crisis conditions.
    evaluation_criteria: >
      Score in (0.01, 0.99) mapped mathematically from revenue growth, workforce stability, cash survival, valuation, and lack of crises.
    grader: "graders:grade_ultimate_ceo_mastery"
    max_steps: 16
    score_range: [0.01, 0.99]
